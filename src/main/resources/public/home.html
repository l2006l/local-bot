<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>机器人文件管理</title>
    <style>
        /* 简单优雅的错误提示样式 */
        #error {
            display: none;
            padding: 40px;
            text-align: center;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
<iframe id="napcat" width="100%"
        height="800px"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade"></iframe>
<!-- 页面不存在时显示这里 -->
<div id="error">
    <h3>⚠️ NapCat WebUI 暂不可用</h3>
    <p>页面可能未启动、地址错误或网络异常</p>
</div>
<script>
    fetch('/api/napcat')
        .then(res => res.json())
        .then(data => {
            const iframe = document.getElementById('napcat');
            const error = document.getElementById('error');

            iframe.src = data.url;

            // 关键：iframe 加载失败时显示提示
            iframe.onerror = function () {
                iframe.style.display = 'none';
                error.style.display = 'block';
            };
        });
</script>
</body>
</html>
